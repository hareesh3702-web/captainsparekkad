<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Captains Parakked</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:url("viking.jpg") center center/cover no-repeat fixed;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Poppins,sans-serif;
overflow:hidden;

}

body::before{

content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.70);

}

.container{

position:relative;
z-index:10;
text-align:center;
animation:fade 2s ease;

}

h1{

font-size:70px;
font-family:Cinzel;
color:#fff;
letter-spacing:3px;
text-shadow:0 0 20px cyan;

animation:glow 3s infinite;

}

.subtitle{

margin-top:15px;
font-size:24px;
color:#ddd;

}

.line{

width:250px;
height:2px;
background:cyan;
margin:25px auto;

}

.members{

display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:30px;

}

.member{

padding:15px 30px;
border:2px solid cyan;
border-radius:50px;
font-size:22px;
color:white;
transition:.4s;
backdrop-filter:blur(5px);

}

.member:hover{

background:cyan;
color:black;
transform:scale(1.1);

}

@keyframes glow{

0%{
text-shadow:0 0 10px cyan;
}

50%{
text-shadow:0 0 40px cyan;
}

100%{
text-shadow:0 0 10px cyan;
}

}

@keyframes fade{

from{
opacity:0;
transform:translateY(50px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="container">

<h1>⚔ Captains Parakked ⚔</h1>

<p class="subtitle">
Established on 2018
</p>

<div class="line"></div>

<div class="members">

<div class="member">Hareesh</div>

<div class="member">Manesh</div>

<div class="member">Shiyadh</div>

<div class="member">Ajeesh</div>

</div>

</div>

</body>
</html>
